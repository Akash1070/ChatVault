name: CI / CD — AI Conversation Vault

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

jobs:
  # ── CI: runs on every push and PR ─────────────────────────────────────────────
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (no native build — prebuilt binary download follows)
        run: npm ci --ignore-scripts

      - name: Download better-sqlite3 prebuilt binary (linux-x64)
        run: node node_modules/better-sqlite3/scripts/download-prebuilt.js
        continue-on-error: true

      - name: Compile both webpack bundles
        run: npm run compile

      - name: Run TypeScript type-check (no emit)
        run: npx tsc --noEmit

  # ── CD: publishes on vX.Y.Z tag push ──────────────────────────────────────────
  publish:
    name: Publish to Marketplace + Open VSX
    needs: build-and-lint
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build production bundle
        run: npm run package

      - name: Install vsce + ovsx
        run: npm install -g @vscode/vsce ovsx

      - name: Package VSIX
        run: vsce package --out "chatvault-${{ github.ref_name }}.vsix"

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: vsce publish --pat "$VSCE_PAT" --packagePath "chatvault-${{ github.ref_name }}.vsix"

      - name: Publish to Open VSX Registry
        if: ${{ env.OVSX_TOKEN != '' }}
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
        run: ovsx publish "chatvault-${{ github.ref_name }}.vsix" --pat "$OVSX_TOKEN"

      - name: Upload VSIX as GitHub Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: "chatvault-${{ github.ref_name }}.vsix"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
